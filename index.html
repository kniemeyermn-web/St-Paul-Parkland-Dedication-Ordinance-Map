<!DOCTYPE html>
<html lang="en">

  <meta charset="UTF-8">

  <title>Parkland Dedication & Funding Sources Map</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #121212;
      --glass-bg: rgba(30, 30, 30, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent: #4ade80;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); overflow: hidden; }
    #app-container { display: flex; height: 100vh; width: 100vw; }
    #sidebar { width: 350px; height: 100vh; background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; z-index: 1000; box-shadow: 4px 0 24px rgba(0, 0, 0, 0.5); }
    .sidebar-header { padding: 24px; border-bottom: 1px solid var(--glass-border); }
    .sidebar-header h1 { font-size: 1.5rem; font-weight: 700; color: #ffffff; margin-bottom: 8px; }
    .sidebar-header p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.4; }
    .park-list { flex: 1; overflow-y: auto; padding: 16px; }
    .park-card { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); border-radius: 12px; padding: 16px; margin-bottom: 12px; cursor: pointer; transition: all 0.3s ease; }
    .park-card:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-2px); border-color: var(--accent); }
    .park-name { font-weight: 600; font-size: 1.1rem; margin-bottom: 4px; color: #fff; }
    .park-address { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 12px; }
    .park-amount { display: inline-block; background: rgba(74, 222, 128, 0.15); color: var(--accent); padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
    #map { flex: 1; height: 100%; background-color: #1a1a1a; }
    .leaflet-popup-content-wrapper { background: rgba(30, 30, 30, 0.9) !important; backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff !important; border-radius: 12px !important; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4) !important; }
    .leaflet-popup-tip { background: rgba(30, 30, 30, 0.9) !important; }
    .popup-title { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 1.1rem; margin: 0 0 4px 0; color: var(--accent); }
    .popup-content { font-family: 'Inter', sans-serif; font-size: 0.9rem; color: #ccc; margin: 0; }
    .leaflet-container a.leaflet-popup-close-button { color: #999; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }
  
    .mobile-close-btn { display: none; background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; }
    .mobile-close-btn:hover { color: #fff; }
    .funding-li { padding: 8px; margin-bottom: 4px; border-radius: 6px; cursor: pointer; transition: all 0.2s; display: flex; justify-content: space-between; border: 1px solid transparent; }
    .funding-li:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); }
    .funding-li.active { background: rgba(245, 158, 11, 0.15); border-color: #f59e0b; }
    
    @media (max-width: 768px) {
      #sidebar { position: absolute; width: 100%; height: 100%; transform: translateX(-100%); transition: transform 0.3s ease; }
      #sidebar.open { transform: translateX(0); }
      #mobile-menu-btn { display: flex !important; align-items: center; justify-content: center; }
      .mobile-close-btn { display: block; }
    }

  </style>
</head>

      <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
    </button>
    <div id="sidebar">

        </div>
      </div>
      <div class="park-list" id="park-list"></div>
    </div>
    <div id="map"></div>

                readout.appendChild(listUl);
            } else {
                readout.innerHTML += `<div style="font-style: italic; color: #9ca3af; margin-top: 8px;">No contributing addresses found.</div>`;
            }
            
            searchCard.addEventListener('click', () => {
                map.flyTo([lat, lon], 15, { duration: 1.5 });
                searchMarker.openPopup();
                document.querySelectorAll('.park-card').forEach(c => c.style.borderColor = '');
                searchCard.style.borderColor = '#3b82f6';
            });
            
            parkListEl.insertBefore(searchCard, parkListEl.firstChild);
            parkListEl.scrollTop = 0; // Scroll to top to ensure result is visible
            
            // Bind popup to marker
            searchMarker.bindPopup(`<h3 class="popup-title" style="color: #3b82f6;">Search Result</h3><p class="popup-content">${displayName}</p>`).openPopup();
            
            document.querySelectorAll('.park-card').forEach(c => {
                if(c !== searchCard) c.style.borderColor = '';
                const ro = c.querySelector('.funding-readout');
                if (ro && c !== searchCard) ro.style.display = 'none';
            });
        };

        // Helper to extract short street address from Nominatim display_name
        const shortAddress = (displayName) => {
            const parts = displayName.split(',').map(p => p.trim());
            // Check if first part is a house number (purely numeric)
            if (parts.length >= 2 && /^\d+$/.test(parts[0])) {
                return parts[0] + ' ' + parts[1]; // e.g. "2515 Wabash Avenue"
            }
            // First part is a business/place name, second is number, third is street
            if (parts.length >= 3 && /^\d+$/.test(parts[1])) {
                return parts[0] + ', ' + parts[1] + ' ' + parts[2];
            }
            // Fallback: return first two parts
            return parts.slice(0, 2).join(', ');
        };

        // Search address logic
        const addressInput = document.getElementById('address-input');
        const addressSearchBtn = document.getElementById('address-search-btn');

        addressSearchBtn.addEventListener('click', async () => {
            const query = addressInput.value.trim();
            if (!query) return;

            addressSearchBtn.textContent = '...';
            
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + ', St Paul, MN')}`);
                const data = await response.json();
                
                if (data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);
                    processLocation(lat, lon, shortAddress(data[0].display_name));
                } else {
                    alert('Address not found. Please try again.');
                }
            } catch (err) {
                console.error(err);
                alert('Error searching for address.');
            } finally {
                addressSearchBtn.textContent = 'Search';
            }
        });

        // Add Enter key support
        addressInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addressSearchBtn.click();
        });

        // Map click logic
        map.on('click', async (e) => {
            const lat = e.latlng.lat;
            const lon = e.latlng.lng;
            
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                const data = await response.json();
                const displayName = data && data.display_name ? shortAddress(data.display_name) : 'Map Click Location';
                processLocation(lat, lon, displayName);
            } catch (err) {
                console.error(err);
                processLocation(lat, lon, 'Map Click Location');
            }
        });

        parkData.sort((a, b) => {
            const nameA = (a.Park || '').toUpperCase();
            const nameB = (b.Park || '').toUpperCase();
            if (nameA < nameB) return -1;
            if (nameA > nameB) return 1;
            return 0;
        });

        parkData.forEach(park => {
            if (park.Latitude && park.Longitude) {
                const marker = L.marker([park.Latitude, park.Longitude], { icon: parkIcon });
                const popupContent = `<h3 class="popup-title">${park.Park || 'Unknown'}</h3><p class="popup-content">${park.Address || ''}, ${park.City || ''}</p><p class="popup-content" style="margin-top: 8px;"><strong>Amount Used:</strong> ${formatMoney(park['Amount Used'])}</p>`;
                marker.bindPopup(popupContent);
                parkMarkers.push(marker);

                const card = document.createElement('div');
                card.className = 'park-card';
                card.innerHTML = `<div class="park-name">${park.Park || 'Unknown'}</div><div class="park-address">${park.Address || ''}</div><div class="park-amount">${formatMoney(park['Amount Used'])}</div><div class="funding-readout" style="display:none; font-size: 0.85rem; color: #ccc;"></div>`;
                card.addEventListener('click', () => {
                    map.flyTo([park.Latitude, park.Longitude], 15, { duration: 1.5 });
                    marker.openPopup();
                    
                    if (currentParkCircle) {
                        map.removeLayer(currentParkCircle);
                    }
                    if (searchMarker) {
                        map.removeLayer(searchMarker);
                    }
                    currentParkCircle = L.circle([park.Latitude, park.Longitude], {
                        radius: 804.672, // 0.5 miles in meters
                        color: 'var(--accent)',
                        weight: 2,
                        fillOpacity: 0.1
                    }).addTo(map);
                    
                    document.querySelectorAll('.funding-readout').forEach(r => r.style.display = 'none');
                    document.querySelectorAll('.park-card').forEach(c => c.style.borderColor = '');
                    card.style.borderColor = 'var(--accent)';
                    card.scrollIntoView({ behavior: 'smooth', block: 'start' });

                    const readout = card.querySelector('.funding-readout');
                    const nearbyFunding = fundingData.filter(item => {
                        if (!item.Latitude || !item.Longitude) return false;
                        const R = 3958.8; // Radius of the earth in miles
                        const dLat = (item.Latitude - park.Latitude) * Math.PI / 180;
                        const dLon = (item.Longitude - park.Longitude) * Math.PI / 180;
                        const a = 0.5 - Math.cos(dLat)/2 + Math.cos(park.Latitude * Math.PI / 180) * Math.cos(item.Latitude * Math.PI / 180) * (1 - Math.cos(dLon))/2;
                        return (R * 2 * Math.asin(Math.sqrt(a))) <= 0.5;
                    });
                    
                    if (nearbyFunding.length > 0) {
                        const totalFees = nearbyFunding.reduce((sum, f) => sum + (f.FEEAMOUNT || 0), 0);
                        let html = `<div style="font-weight: 600; margin-bottom: 8px; color: var(--accent); border-top: 1px solid var(--glass-border); padding-top: 12px; margin-top: 12px; display: flex; justify-content: space-between; align-items: center;">
                            <span>Contributing Addresses (&le; 0.5 miles):</span>
                            <span style="color: #f59e0b; background: rgba(245, 158, 11, 0.15); padding: 4px 8px; border-radius: 12px; font-size: 0.8rem;">Total: ${formatMoney(totalFees)}</span>
                        </div>`;
                        readout.innerHTML = html;
                        
                        const listUl = document.createElement('ul');
                        listUl.style.cssText = 'list-style-type: none; padding: 0;';
                        
                        nearbyFunding.forEach(f => {
                            const li = document.createElement('li');
                            li.className = 'funding-li';
                            li.innerHTML = `<span>${f.ADDRESS}</span> <span style="color: #f59e0b;">${formatMoney(f.FEEAMOUNT)}</span>`;
                            li.addEventListener('click', (ev) => {
                                ev.stopPropagation();
                                document.querySelectorAll('.funding-li').forEach(el => el.classList.remove('active'));
                                fundingData.forEach(item => {
                                    if(item.marker) {
                                        item.marker.setIcon(fundingIcon);
                                        item.marker.setZIndexOffset(0);
                                    }
                                });
                                li.classList.add('active');
                                if (f.marker) {
                                    f.marker.setIcon(L.divIcon({
                                        className: 'custom-marker funding highlight',
                                        html: '<div style="background-color: #ef4444; width: 14px; height: 14px; border-radius: 50%; border: 2px solid #fff;"></div>',
                                        iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -10]
                                    }));
                                    f.marker.setZIndexOffset(1000);
                                    map.flyTo([f.mapLat || f.Latitude, f.mapLon || f.Longitude], 17, { duration: 1.0 });
                                    f.marker.openPopup();
                                }
                                if (window.innerWidth <= 768) {
                                    document.getElementById('sidebar').classList.remove('open');
                                }
                            });
                            listUl.appendChild(li);
                        });
                        readout.appendChild(listUl);
                    } else {
                        readout.innerHTML = `<div style="font-style: italic; color: var(--text-muted); border-top: 1px solid var(--glass-border); padding-top: 12px; margin-top: 12px;">No contributing addresses found within 0.5 miles.</div>`;
                    }
                    readout.style.display = 'block';
                });
                
                marker.on('click', () => {
                    card.click();
                });

                parkListEl.appendChild(card);
            }
        });



        const parkLayerGroup = L.layerGroup(parkMarkers).addTo(map);
        const fundingLayerGroup = L.layerGroup(fundingMarkers).addTo(map);

        const baseMaps = {
            "Dark": darkLayer,
            "Light": lightLayer,
            "Satellite": satLayer
        };
        const overlayMaps = {
            "Parks (Green)": parkLayerGroup,
            "Funding Sources (Orange)": fundingLayerGroup
        };

        L.control.layers(baseMaps, overlayMaps, { position: 'topright' }).addTo(map);

        const group = new L.featureGroup(parkMarkers.concat(fundingMarkers));
        if (parkMarkers.length > 0 || fundingMarkers.length > 0) {
            map.fitBounds(group.getBounds().pad(0.1));
        }
        
        // Mobile Sidebar Handlers
        document.getElementById('mobile-menu-btn').addEventListener('click', () => {
            document.getElementById('sidebar').classList.add('open');
        });
        document.getElementById('mobile-close-btn').addEventListener('click', () => {
            document.getElementById('sidebar').classList.remove('open');
        });
        
        // Legend Control
        const legend = L.control({ position: 'bottomleft' });
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'info legend');
            div.style.backgroundColor = 'rgba(30, 30, 30, 0.8)';
            div.style.padding = '10px 15px';
            div.style.borderRadius = '8px';
            div.style.border = '1px solid rgba(255, 255, 255, 0.1)';
            div.style.backdropFilter = 'blur(10px)';
            div.style.color = '#fff';
            div.style.fontFamily = 'Inter, sans-serif';
            div.style.fontSize = '0.85rem';
            div.style.boxShadow = '0 4px 12px rgba(0,0,0,0.5)';

            div.innerHTML = `
                <div style="font-weight: 600; margin-bottom: 8px; font-size: 0.95rem;">Map Legend</div>
                <div style="display: flex; align-items: center; margin-bottom: 6px;">
                    <div style="width: 14px; height: 14px; border-radius: 50%; background-color: #4ade80; border: 2px solid #fff; margin-right: 8px; box-shadow: 0 0 6px rgba(74, 222, 128, 0.8);"></div>
                    <span>Park Location</span>
                </div>
                <div style="display: flex; align-items: center; margin-bottom: 6px;">
                    <div style="width: 10px; height: 10px; border-radius: 50%; background-color: #f59e0b; border: 1px solid #fff; margin-right: 10px; margin-left: 2px; box-shadow: 0 0 4px rgba(245, 158, 11, 0.8);"></div>
                    <span>Funding Source</span>
                </div>
                <div style="display: flex; align-items: center; margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px;">
                    <div style="width: 16px; height: 16px; border-radius: 50%; background-color: rgba(59, 130, 246, 0.1); border: 2px solid #3b82f6; margin-right: 8px;"></div>
                    <span style="max-width: 200px; line-height: 1.3;">0.5-Mile Radius<br><span style="font-size: 0.75rem; color: #9ca3af;">Parkland Dedication Ordinance fee catchment area</span></span>
                </div>
            `;
            return div;
        };
        legend.addTo(map);

    } catch (e) {
        console.error("Error initializing map: ", e);
    }
  </script>
</body>
</html>
